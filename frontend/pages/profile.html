<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Inkwell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <style>
    .profile-page {
      max-width: 860px;
      margin: 0 auto;
      padding: var(--space-10) var(--space-6) var(--space-20);
    }

    /* ── Profile header ── */
    .profile-header {
      display: flex;
      align-items: flex-start;
      gap: var(--space-6);
      margin-bottom: var(--space-10);
      padding-bottom: var(--space-8);
      border-bottom: 2px solid var(--paper-3);
    }

    .profile-avatar-wrap { position: relative; flex-shrink: 0; }

    .profile-avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--paper-3);
    }

    .profile-avatar-placeholder {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--white);
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid var(--paper-3);
    }

    .profile-avatar-edit {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 13px;
      border: 2px solid var(--paper);
    }

    .profile-info { flex: 1; }

    .profile-username {
      font-family: 'DM Serif Display', serif;
      font-size: var(--text-3xl);
      color: var(--ink);
      margin-bottom: var(--space-1);
    }

    .profile-email {
      font-size: var(--text-sm);
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-faint);
      margin-bottom: var(--space-3);
    }

    .profile-bio {
      font-size: var(--text-base);
      color: var(--ink-muted);
      line-height: 1.65;
      max-width: 480px;
    }

    .profile-bio-empty {
      font-style: italic;
      color: var(--ink-faint);
    }

    .profile-actions {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-4);
    }

    /* ── Edit form ── */
    .edit-profile-form {
      background: var(--white);
      border: 1px solid var(--paper-3);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      margin-bottom: var(--space-8);
    }

    .edit-profile-form h3 {
      font-size: var(--text-xl);
      margin-bottom: var(--space-5);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin-bottom: var(--space-4);
    }

    .form-group label {
      font-size: var(--text-xs);
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .form-input, .form-textarea {
      border: 1px solid var(--paper-3);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      color: var(--ink);
      background: var(--paper);
      transition: border-color var(--dur-fast);
    }
    .form-input:focus, .form-textarea:focus {
      border-color: var(--accent);
      outline: none;
    }
    .form-textarea { resize: vertical; min-height: 90px; }

    .form-actions { display: flex; gap: var(--space-3); justify-content: flex-end; }

    /* ── Posts section ── */
    .section-heading {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--text-xs);
      color: var(--ink-faint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--space-5);
    }

    .posts-list { display: flex; flex-direction: column; gap: var(--space-4); }

    .post-row {
      display: flex;
      align-items: flex-start;
      gap: var(--space-4);
      padding: var(--space-4) var(--space-5);
      background: var(--white);
      border: 1px solid var(--paper-3);
      border-radius: var(--radius-lg);
      transition: box-shadow var(--dur-fast), border-color var(--dur-fast);
    }
    .post-row:hover { box-shadow: var(--shadow-sm); border-color: var(--accent); }

    .post-row-body { flex: 1; cursor: pointer; }

    .post-row-title {
      font-family: 'DM Serif Display', serif;
      font-size: var(--text-xl);
      color: var(--ink);
      margin-bottom: var(--space-1);
    }

    .post-row-meta {
      font-size: var(--text-xs);
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-faint);
      display: flex;
      gap: var(--space-3);
      align-items: center;
    }

    .draft-badge {
      background: var(--paper-2);
      color: var(--ink-muted);
      border: 1px solid var(--paper-3);
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-family: 'JetBrains Mono', monospace;
    }

    .post-row-actions {
      display: flex;
      gap: var(--space-2);
      flex-shrink: 0;
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      border: 1px solid var(--paper-3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-muted);
      transition: border-color var(--dur-fast), color var(--dur-fast), background var(--dur-fast);
      flex-shrink: 0;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
    .btn-icon.danger:hover { background: #fee2e2; border-color: #dc2626; color: #dc2626; }
    .btn-icon svg { width: 15px; height: 15px; }

    /* Tab bar */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--paper-3);
      margin-bottom: var(--space-6);
    }

    .tab {
      padding: var(--space-3) var(--space-5);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--ink-muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      transition: color var(--dur-fast), border-color var(--dur-fast);
    }
    .tab:hover { color: var(--ink); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    @media (max-width: 600px) {
      .profile-header { flex-direction: column; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="../index.html" class="nav-brand">Inkwell</a>
    <div class="nav-links">
      <a href="../index.html" class="nav-link">Feed</a>
      <a href="write.html" class="nav-link" id="nav-write">Write</a>
      <a href="bookmarks.html" class="nav-link" id="nav-bookmarks">Bookmarks</a>
    </div>
    <div class="nav-auth" id="nav-auth">
      <a href="login.html" class="btn btn-ghost">Sign in</a>
      <a href="register.html" class="btn btn-primary">Join</a>
    </div>
    <div class="nav-user hidden" id="nav-user">
      <div class="avatar-wrap" id="nav-avatar-wrap"></div>
    </div>
  </nav>

  <!-- PROFILE -->
  <div class="profile-page">

    <!-- HEADER -->
    <div class="profile-header" id="profile-header">
      <div style="color:var(--ink-faint);font-size:var(--text-sm);">Loading profile…</div>
    </div>

    <!-- EDIT FORM (hidden by default) -->
    <div class="edit-profile-form hidden" id="edit-form">
      <h3>Edit profile</h3>
      <div class="form-row">
        <div class="form-group">
          <label for="edit-username">Username</label>
          <input type="text" class="form-input" id="edit-username" />
        </div>
        <div class="form-group">
          <label>Avatar</label>
          <input type="file" id="edit-avatar" accept="image/*" style="padding:6px;border:1px solid var(--paper-3);border-radius:var(--radius-md);" />
        </div>
      </div>
      <div class="form-group">
        <label for="edit-bio">Bio</label>
        <textarea class="form-textarea" id="edit-bio" placeholder="Tell readers a bit about yourself…"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" id="btn-cancel-edit">Cancel</button>
        <button class="btn btn-primary" id="btn-save-profile">Save changes</button>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" data-tab="published">Published</button>
      <button class="tab" data-tab="drafts">Drafts</button>
    </div>

    <!-- POSTS -->
    <div id="posts-section">
      <p style="font-size:var(--text-sm);color:var(--ink-faint);">Loading…</p>
    </div>

  </div>

  <!-- HIDDEN FILE INPUT for avatar -->
  <input type="file" id="avatar-file-input" accept="image/*" style="display:none;" />

  <!-- TOAST -->
  <div class="toast-container" id="toast-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    let profileUser = null;
    let activeTab = 'published';
    let allUserPosts = [];

    /* ── Init ── */
    async function init() {
      await AuthState.init();
      if (!AuthState.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }

      await loadProfile();
      await loadPosts();
      bindEvents();
    }

    /* ── Load profile ── */
    async function loadProfile() {
      try {
        profileUser = await API.Auth.getMe();
        AuthState.save(profileUser);
        renderProfileHeader(profileUser);
        prefillEditForm(profileUser);
      } catch {
        document.getElementById('profile-header').innerHTML =
          `<p style="color:var(--ink-faint)">Could not load profile.</p>`;
      }
    }

    function renderProfileHeader(user) {
      const avatarHtml = user.avatar
        ? `<img class="profile-avatar" src="${user.avatar.startsWith('http') ? user.avatar : 'http://127.0.0.1:8000' + user.avatar}" alt="${user.username}" />`
        : `<div class="profile-avatar-placeholder">${(user.username || 'U')[0].toUpperCase()}</div>`;

      document.getElementById('profile-header').innerHTML = `
        <div class="profile-avatar-wrap">
          ${avatarHtml}
          <label class="profile-avatar-edit" title="Change avatar" for="avatar-file-input">✎</label>
        </div>
        <div class="profile-info">
          <h1 class="profile-username">${UI.esc(user.username)}</h1>
          <p class="profile-email">${UI.esc(user.email)}</p>
          ${user.bio
            ? `<p class="profile-bio">${UI.esc(user.bio)}</p>`
            : `<p class="profile-bio profile-bio-empty">No bio yet.</p>`
          }
          <div class="profile-actions">
            <button class="btn btn-ghost" id="btn-edit-profile">Edit profile</button>
            <a href="write.html" class="btn btn-primary">New post</a>
          </div>
        </div>
      `;

      // Re-bind edit button after re-render
      document.getElementById('btn-edit-profile')?.addEventListener('click', () => {
        document.getElementById('edit-form').classList.toggle('hidden');
      });
    }

    function prefillEditForm(user) {
      document.getElementById('edit-username').value = user.username || '';
      document.getElementById('edit-bio').value = user.bio || '';
    }

    /* ── Load posts ── */
    async function loadPosts() {
      try {
        const [publishedData, draftsData] = await Promise.all([
          API.Posts.list({ author: profileUser?.username }),
          API.Posts.myDrafts(),
        ]);
        const published = Array.isArray(publishedData) ? publishedData : (publishedData.results || []);
        const drafts = Array.isArray(draftsData) ? draftsData : (draftsData.results || []);
        allUserPosts = { published, drafts };
        renderPostsSection();
      } catch {
        document.getElementById('posts-section').innerHTML =
          `<p style="color:var(--ink-faint);font-size:var(--text-sm);">Could not load posts.</p>`;
      }
    }

    function renderPostsSection() {
      const section = document.getElementById('posts-section');
      const posts = allUserPosts[activeTab] || [];

      if (!posts.length) {
        section.innerHTML = UI.emptyState(
          activeTab === 'published' ? '📝' : '✏️',
          activeTab === 'published' ? 'No published posts yet' : 'No drafts yet',
          activeTab === 'published'
            ? 'Publish your first post to see it here.'
            : 'Start writing to save a draft.',
          `<a href="write.html" class="btn btn-primary">Start writing</a>`
        );
        return;
      }

      section.innerHTML = `<div class="posts-list">${posts.map(p => postRowHtml(p)).join('')}</div>`;

      // Bind clicks
      section.querySelectorAll('.post-row-body').forEach(el => {
        el.addEventListener('click', () => goToPost(el.dataset.slug));
      });
      section.querySelectorAll('.btn-edit-post').forEach(btn => {
        btn.addEventListener('click', () => {
          window.location.href = `write.html?slug=${btn.dataset.slug}`;
        });
      });
      section.querySelectorAll('.btn-delete-post').forEach(btn => {
        btn.addEventListener('click', () => deletePost(btn.dataset.slug));
      });
    }

    function postRowHtml(post) {
      const date = post.published_at || post.created_at;
      return `
        <div class="post-row">
          <div class="post-row-body" data-slug="${post.slug}">
            <h2 class="post-row-title">${UI.esc(post.title || 'Untitled')}</h2>
            <div class="post-row-meta">
              <span>${UI.formatDate(date)}</span>
              <span>♡ ${post.like_count ?? 0}</span>
              <span>💬 ${post.comment_count ?? 0}</span>
              ${post.status === 'draft' ? '<span class="draft-badge">Draft</span>' : ''}
            </div>
          </div>
          <div class="post-row-actions">
            <button class="btn-icon btn-edit-post" data-slug="${post.slug}" title="Edit">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                <path d="M13.586 3.586a2 2 0 112.828 2.828L6 16.828l-4 1 1-4 10.586-10.242z"/>
              </svg>
            </button>
            <button class="btn-icon danger btn-delete-post" data-slug="${post.slug}" title="Delete">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                <path d="M3 6h14M8 6V4h4v2M5 6l1 12h8l1-12"/>
              </svg>
            </button>
          </div>
        </div>
      `;
    }

    async function deletePost(slug) {
      if (!confirm('Delete this post? This cannot be undone.')) return;
      try {
        await API.Posts.delete(slug);
        UI.toast('Post deleted', 'success');
        await loadPosts();
      } catch {
        UI.toast('Could not delete post', 'error');
      }
    }

    /* ── Events ── */
    function bindEvents() {
      // Tabs
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          activeTab = tab.dataset.tab;
          renderPostsSection();
        });
      });

      // Cancel edit
      document.getElementById('btn-cancel-edit').addEventListener('click', () => {
        document.getElementById('edit-form').classList.add('hidden');
      });

      // Save profile
      document.getElementById('btn-save-profile').addEventListener('click', async () => {
        const btn = document.getElementById('btn-save-profile');
        UI.setLoading(btn, true);
        try {
          const updated = await API.Auth.updateMe({
            username: document.getElementById('edit-username').value.trim(),
            bio: document.getElementById('edit-bio').value.trim(),
          });
          AuthState.save(updated);
          profileUser = updated;
          renderProfileHeader(updated);
          document.getElementById('edit-form').classList.add('hidden');
          UI.toast('Profile updated', 'success');
        } catch (err) {
          UI.toast(err.message || 'Update failed', 'error');
        } finally {
          UI.setLoading(btn, false);
        }
      });

      // Avatar upload
      document.getElementById('avatar-file-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const fd = new FormData();
        fd.append('avatar', file);
        try {
          const updated = await API.Auth.updateMe(fd);
          AuthState.save(updated);
          profileUser = updated;
          renderProfileHeader(updated);
          UI.toast('Avatar updated', 'success');
        } catch {
          UI.toast('Avatar upload failed', 'error');
        }
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
