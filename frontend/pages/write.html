<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="
  default-src 'self'; 
  script-src 'self' 'unsafe-inline'; 
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
  font-src 'self' data: https://fonts.gstatic.com; 
  connect-src 'self' http://127.0.0.1:8000 http://localhost:8000 ws://127.0.0.1:* ws://localhost:*;">
  <title>Write — Inkwell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <style>
    .write-layout {
      max-width: 780px;
      margin: 0 auto;
      padding: var(--space-10) var(--space-6) var(--space-20);
    }

    .write-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-8);
    }

    .write-header h1 {
      font-size: var(--text-2xl);
      color: var(--ink);
    }

    .write-actions {
      display: flex;
      gap: var(--space-3);
      align-items: center;
    }

    /* Title input — big, editorial */
    .post-title-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      color: var(--ink);
      line-height: 1.2;
      padding: var(--space-4) 0;
      border-bottom: 2px solid var(--paper-3);
      margin-bottom: var(--space-6);
      transition: border-color var(--dur-fast);
      resize: none;
      overflow: hidden;
    }
    .post-title-input:focus { border-bottom-color: var(--accent); }
    .post-title-input::placeholder { color: var(--paper-3); }

    /* Content textarea */
    .post-content-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: var(--text-lg);
      color: var(--ink);
      line-height: 1.75;
      min-height: 420px;
      resize: none;
      padding: 0;
    }
    .post-content-input::placeholder { color: var(--ink-faint); }

    /* Meta row — category, tags, status */
    .write-meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-4);
      align-items: flex-end;
      padding: var(--space-5) 0;
      border-top: 1px solid var(--paper-3);
      border-bottom: 1px solid var(--paper-3);
      margin-bottom: var(--space-6);
    }

    .meta-field {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .meta-label {
      font-size: var(--text-xs);
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .meta-select {
      border: 1px solid var(--paper-3);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-3);
      background: var(--white);
      color: var(--ink);
      font-size: var(--text-sm);
      min-width: 140px;
      cursor: pointer;
      transition: border-color var(--dur-fast);
    }
    .meta-select:focus { border-color: var(--accent); outline: none; }

    .tag-input-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      border: 1px solid var(--paper-3);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-3);
      background: var(--white);
      min-width: 220px;
      transition: border-color var(--dur-fast);
      cursor: text;
    }
    .tag-input-wrap:focus-within { border-color: var(--accent); }

    .tag-chip-removable {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: var(--text-xs);
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 8px;
      border-radius: var(--radius-full);
    }
    .tag-chip-removable button {
      color: var(--accent);
      font-size: 14px;
      line-height: 1;
      padding: 0;
    }

    .tag-text-input {
      border: none;
      outline: none;
      background: transparent;
      font-size: var(--text-sm);
      color: var(--ink);
      min-width: 80px;
      flex: 1;
    }

    /* Drafts sidebar */
    .write-page {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: var(--space-8);
      max-width: 1100px;
      margin: 0 auto;
      padding: var(--space-10) var(--space-6) var(--space-20);
    }

    .drafts-sidebar {
      padding-top: 80px;
    }

    .drafts-heading {
      font-size: var(--text-sm);
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: var(--space-4);
    }

    .draft-item {
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      border: 1px solid var(--paper-3);
      background: var(--white);
      margin-bottom: var(--space-3);
      cursor: pointer;
      transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
    }
    .draft-item:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
    .draft-item.active { border-color: var(--accent); background: var(--accent-dim); }

    .draft-item-title {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .draft-item-date {
      font-size: var(--text-xs);
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-faint);
    }

    .new-post-btn {
      width: 100%;
      justify-content: center;
      margin-bottom: var(--space-4);
    }

    @media (max-width: 768px) {
      .write-page { grid-template-columns: 1fr; }
      .drafts-sidebar { padding-top: 0; border-top: 1px solid var(--paper-3); padding-top: var(--space-6); }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="../index.html" class="nav-brand">Inkwell</a>
    <div class="nav-links">
      <a href="../index.html" class="nav-link">Feed</a>
      <a href="write.html" class="nav-link active" id="nav-write">Write</a>
      <a href="bookmarks.html" class="nav-link" id="nav-bookmarks">Bookmarks</a>
    </div>
    <div class="nav-auth" id="nav-auth">
      <a href="login.html" class="btn btn-ghost">Sign in</a>
      <a href="register.html" class="btn btn-primary">Join</a>
    </div>
    <div class="nav-user hidden" id="nav-user">
      <div class="avatar-wrap" id="nav-avatar-wrap"></div>
    </div>
  </nav>

  <!-- MAIN LAYOUT -->
  <div class="write-page">

    <!-- EDITOR -->
    <main class="write-editor">
      <div class="write-header">
        <h1 id="editor-heading">New post</h1>
        <div class="write-actions">
          <span class="mono" id="save-status" style="font-size:var(--text-xs);color:var(--ink-faint);"></span>
          <button class="btn btn-ghost" id="btn-save-draft">Save draft</button>
          <button class="btn btn-primary" id="btn-publish">Publish</button>
        </div>
      </div>

      <!-- META -->
      <div class="write-meta">
        <div class="meta-field">
          <label class="meta-label" for="post-category">Category</label>
          <select class="meta-select" id="post-category">
            <option value="">None</option>
          </select>
        </div>

        <div class="meta-field">
          <label class="meta-label">Tags</label>
          <div class="tag-input-wrap" id="tag-input-wrap">
            <input
              type="text"
              class="tag-text-input"
              id="tag-text-input"
              placeholder="Add tag, press Enter"
            />
          </div>
        </div>
      </div>

      <!-- TITLE -->
      <textarea
        class="post-title-input"
        id="post-title"
        placeholder="Your title here…"
        rows="1"
      ></textarea>

      <!-- CONTENT -->
      <textarea
        class="post-content-input"
        id="post-content"
        placeholder="Tell your story…"
      ></textarea>
    </main>

    <!-- DRAFTS SIDEBAR -->
    <aside class="drafts-sidebar">
      <button class="btn btn-ghost new-post-btn" id="btn-new-post">+ New post</button>
      <p class="drafts-heading">My Drafts</p>
      <div id="drafts-list">
        <p style="font-size:var(--text-sm);color:var(--ink-faint);">Loading…</p>
      </div>
    </aside>

  </div>

  <!-- TOAST -->
  <div class="toast-container" id="toast-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    /* ── State ── */
    let currentSlug = null;      // null = new post, string = editing existing
    let selectedTagSlugs = [];   // list of tag slugs chosen
    let allTags = [];
    let saveTimer = null;

    /* ── Init ── */
    async function init() {
      await AuthState.init();
      if (!AuthState.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }

      // Check if editing existing post via ?slug=
      const params = new URLSearchParams(window.location.search);
      const editSlug = params.get('slug');

      await Promise.all([loadCategories(), loadTags(), loadDrafts()]);

      if (editSlug) {
        await loadPostForEditing(editSlug);
      }

      bindEvents();
    }

    /* ── Load meta ── */
    async function loadCategories() {
      try {
        const data = await API.Posts.categories();
        const cats = Array.isArray(data) ? data : (data.results || []);
        const sel = document.getElementById('post-category');
        cats.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.name;
          sel.appendChild(opt);
        });
      } catch { /* skip */ }
    }

    async function loadTags() {
      try {
        const data = await API.Posts.tags();
        allTags = Array.isArray(data) ? data : (data.results || []);
      } catch { /* skip */ }
    }

    async function loadDrafts() {
      try {
        const data = await API.Posts.myDrafts();
        const drafts = Array.isArray(data) ? data : (data.results || []);
        renderDraftsList(drafts);
      } catch { /* skip */ }
    }

    function renderDraftsList(drafts) {
      const list = document.getElementById('drafts-list');
      if (!drafts.length) {
        list.innerHTML = `<p style="font-size:var(--text-sm);color:var(--ink-faint);">No drafts yet.</p>`;
        return;
      }
      list.innerHTML = drafts.map(d => `
        <div class="draft-item ${currentSlug === d.slug ? 'active' : ''}"
             onclick="loadPostForEditing('${d.slug}')">
          <p class="draft-item-title">${UI.esc(d.title || 'Untitled')}</p>
          <p class="draft-item-date">${UI.formatDate(d.created_at)}</p>
        </div>
      `).join('');
    }

    /* ── Load post for editing ── */
    async function loadPostForEditing(slug) {
      try {
        const post = await API.Posts.get(slug);
        currentSlug = slug;
        document.getElementById('editor-heading').textContent = 'Edit post';
        document.getElementById('post-title').value = post.title || '';
        document.getElementById('post-content').value = post.content || '';
        autoResizeTitle();

        // Set category
        if (post.category) {
          document.getElementById('post-category').value = post.category.id;
        }

        // Set tags
        selectedTagSlugs = (post.tags || []).map(t => t.slug);
        renderTagChips(post.tags || []);

        // Update URL
        history.replaceState({}, '', `?slug=${slug}`);

        // Mark active draft
        document.querySelectorAll('.draft-item').forEach(el => {
          el.classList.toggle('active', el.querySelector('.draft-item-title')?.textContent === post.title);
        });
      } catch {
        UI.toast('Could not load post', 'error');
      }
    }

    /* ── Tag chip rendering ── */
    function renderTagChips(tags) {
      const wrap = document.getElementById('tag-input-wrap');
      // Remove existing chips
      wrap.querySelectorAll('.tag-chip-removable').forEach(el => el.remove());
      tags.forEach(t => addTagChip(t));
    }

    function addTagChip(tag) {
      const wrap = document.getElementById('tag-input-wrap');
      const input = document.getElementById('tag-text-input');
      const chip = document.createElement('span');
      chip.className = 'tag-chip-removable';
      chip.dataset.slug = tag.slug;
      chip.innerHTML = `#${UI.esc(tag.name)} <button aria-label="Remove">&times;</button>`;
      chip.querySelector('button').addEventListener('click', () => {
        chip.remove();
        selectedTagSlugs = selectedTagSlugs.filter(s => s !== tag.slug);
      });
      wrap.insertBefore(chip, input);
      if (!selectedTagSlugs.includes(tag.slug)) selectedTagSlugs.push(tag.slug);
    }

    /* ── Auto-resize title textarea ── */
    function autoResizeTitle() {
      const el = document.getElementById('post-title');
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }

    /* ── Save helpers ── */
    function setSaveStatus(msg) {
      document.getElementById('save-status').textContent = msg;
    }

    function buildPostPayload(status) {
      const categoryEl = document.getElementById('post-category');
      const tagIds = allTags
        .filter(t => selectedTagSlugs.includes(t.slug))
        .map(t => t.id);

      return {
        title: document.getElementById('post-title').value.trim(),
        content: document.getElementById('post-content').value.trim(),
        status,
        ...(categoryEl.value ? { category_id: categoryEl.value } : {}),
        tag_ids: tagIds,
      };
    }

    async function savePost(status) {
      const payload = buildPostPayload(status);
      if (!payload.title) { UI.toast('Please add a title', 'error'); return; }

      const btn = status === 'published' ? document.getElementById('btn-publish') : document.getElementById('btn-save-draft');
      UI.setLoading(btn, true);
      setSaveStatus('Saving…');

      try {
        let post;
        if (currentSlug) {
          post = await API.Posts.update(currentSlug, payload);
        } else {
          post = await API.Posts.create(payload);
          currentSlug = post.slug;
          history.replaceState({}, '', `?slug=${post.slug}`);
        }

        setSaveStatus(`Saved ${UI.formatRelative(new Date().toISOString())}`);
        UI.toast(status === 'published' ? 'Published!' : 'Draft saved', 'success');

        if (status === 'published') {
          setTimeout(() => window.location.href = `post.html?slug=${post.slug}`, 800);
        } else {
          await loadDrafts();
        }
      } catch (err) {
        UI.toast(err.message || 'Save failed', 'error');
        setSaveStatus('');
      } finally {
        UI.setLoading(btn, false);
      }
    }

    /* ── Events ── */
    function bindEvents() {
      // Autoresize title
      document.getElementById('post-title').addEventListener('input', autoResizeTitle);

      // Auto-save draft on content change (debounced 3s)
      ['post-title', 'post-content'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
          clearTimeout(saveTimer);
          setSaveStatus('Unsaved…');
          saveTimer = setTimeout(() => {
            if (document.getElementById('post-title').value.trim()) savePost('draft');
          }, 3000);
        });
      });

      // Buttons
      document.getElementById('btn-save-draft').addEventListener('click', () => savePost('draft'));
      document.getElementById('btn-publish').addEventListener('click', () => savePost('published'));
      document.getElementById('btn-new-post').addEventListener('click', () => {
        currentSlug = null;
        selectedTagSlugs = [];
        document.getElementById('post-title').value = '';
        document.getElementById('post-content').value = '';
        document.getElementById('post-category').value = '';
        renderTagChips([]);
        document.getElementById('editor-heading').textContent = 'New post';
        history.replaceState({}, '', window.location.pathname);
        setSaveStatus('');
        autoResizeTitle();
      });

      // Tag input
      document.getElementById('tag-text-input').addEventListener('keydown', async (e) => {
        if (e.key !== 'Enter' && e.key !== ',') return;
        e.preventDefault();
        const val = e.target.value.trim().toLowerCase().replace(/\s+/g, '-');
        if (!val) return;

        // Find or create tag
        let tag = allTags.find(t => t.name.toLowerCase() === val || t.slug === val);
        if (!tag) {
          try {
            tag = await API.Posts.createTag({ name: val, slug: val });
            allTags.push(tag);
          } catch {
            UI.toast('Could not create tag', 'error');
            return;
          }
        }
        if (!selectedTagSlugs.includes(tag.slug)) addTagChip(tag);
        e.target.value = '';
      });

      // Tag input wrap click focuses input
      document.getElementById('tag-input-wrap').addEventListener('click', () => {
        document.getElementById('tag-text-input').focus();
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
