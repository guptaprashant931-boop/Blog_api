<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmarks — Inkwell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <style>
    .bookmarks-page {
      max-width: 780px;
      margin: 0 auto;
      padding: var(--space-10) var(--space-6) var(--space-20);
    }

    .page-header {
      margin-bottom: var(--space-8);
      padding-bottom: var(--space-6);
      border-bottom: 2px solid var(--paper-3);
    }

    .page-header h1 {
      font-size: var(--text-3xl);
      color: var(--ink);
      margin-bottom: var(--space-2);
    }

    .page-header p {
      color: var(--ink-muted);
      font-size: var(--text-sm);
    }

    .bookmark-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--text-xs);
      color: var(--ink-faint);
      margin-left: var(--space-2);
    }

    .bookmarks-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .bookmark-card {
      display: flex;
      gap: var(--space-4);
      padding: var(--space-5);
      background: var(--white);
      border: 1px solid var(--paper-3);
      border-radius: var(--radius-lg);
      transition: box-shadow var(--dur-fast), border-color var(--dur-fast);
    }
    .bookmark-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--accent);
    }

    .bookmark-body {
      flex: 1;
      cursor: pointer;
    }

    .bookmark-meta {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
    }

    .bookmark-author {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--ink-muted);
    }

    .bookmark-date {
      font-size: var(--text-xs);
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-faint);
    }

    .bookmark-title {
      font-family: 'DM Serif Display', serif;
      font-size: var(--text-xl);
      color: var(--ink);
      margin-bottom: var(--space-2);
      line-height: 1.25;
    }

    .bookmark-excerpt {
      font-size: var(--text-sm);
      color: var(--ink-muted);
      line-height: 1.6;
      margin-bottom: var(--space-3);
    }

    .bookmark-footer {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }

    .bookmark-stat {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: var(--text-xs);
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-faint);
    }
    .bookmark-stat svg { width: 13px; height: 13px; }

    .bookmark-category {
      font-size: var(--text-xs);
      font-family: 'JetBrains Mono', monospace;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: var(--radius-full);
    }

    .btn-unbookmark {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-md);
      border: 1px solid var(--paper-3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      background: var(--accent-dim);
      transition: background var(--dur-fast), border-color var(--dur-fast);
      flex-shrink: 0;
      align-self: flex-start;
    }
    .btn-unbookmark:hover {
      background: #fde8e3;
      border-color: var(--accent);
    }
    .btn-unbookmark svg { width: 15px; height: 15px; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="../index.html" class="nav-brand">Inkwell</a>
    <div class="nav-links">
      <a href="../index.html" class="nav-link">Feed</a>
      <a href="write.html" class="nav-link" id="nav-write">Write</a>
      <a href="bookmarks.html" class="nav-link active" id="nav-bookmarks">Bookmarks</a>
    </div>
    <div class="nav-auth" id="nav-auth">
      <a href="login.html" class="btn btn-ghost">Sign in</a>
      <a href="register.html" class="btn btn-primary">Join</a>
    </div>
    <div class="nav-user hidden" id="nav-user">
      <div class="avatar-wrap" id="nav-avatar-wrap"></div>
    </div>
  </nav>

  <!-- BOOKMARKS -->
  <div class="bookmarks-page">

    <div class="page-header">
      <h1>
        Bookmarks
        <span class="bookmark-count" id="bookmark-count"></span>
      </h1>
      <p>Posts you've saved to read later.</p>
    </div>

    <div id="bookmarks-container">
      <!-- skeleton -->
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div class="post-card skeleton" style="height:140px;border-radius:12px;"></div>
        <div class="post-card skeleton" style="height:140px;border-radius:12px;"></div>
        <div class="post-card skeleton" style="height:140px;border-radius:12px;"></div>
      </div>
    </div>

  </div>

  <!-- TOAST -->
  <div class="toast-container" id="toast-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    let bookmarks = [];

    async function init() {
      await AuthState.init();
      if (!AuthState.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }
      await loadBookmarks();
    }

    async function loadBookmarks() {
      try {
        const data = await API.Interactions.myBookmarks();
        bookmarks = Array.isArray(data) ? data : (data.results || []);
        renderBookmarks();
      } catch {
        document.getElementById('bookmarks-container').innerHTML =
          UI.emptyState('📡', 'Could not load bookmarks', 'Make sure the backend is running.',
            `<button class="btn btn-ghost" onclick="loadBookmarks()">Try again</button>`);
      }
    }

    function renderBookmarks() {
      const container = document.getElementById('bookmarks-container');
      const countEl = document.getElementById('bookmark-count');

      countEl.textContent = bookmarks.length ? `(${bookmarks.length})` : '';

      if (!bookmarks.length) {
        container.innerHTML = UI.emptyState(
          '🔖',
          'No bookmarks yet',
          'Tap the bookmark icon on any post to save it here.',
          `<a href="../index.html" class="btn btn-primary">Browse posts</a>`
        );
        return;
      }

      container.innerHTML = `
        <div class="bookmarks-list">
          ${bookmarks.map((post, idx) => bookmarkCardHtml(post, idx)).join('')}
        </div>
      `;

      // Bind events
      container.querySelectorAll('.bookmark-body').forEach(el => {
        el.addEventListener('click', () => goToPost(el.dataset.slug));
      });
      container.querySelectorAll('.btn-unbookmark').forEach(btn => {
        btn.addEventListener('click', () => toggleBookmark(btn.dataset.slug, btn.dataset.idx));
      });
    }

    function bookmarkCardHtml(post, idx) {
      const date = post.published_at || post.created_at;
      const avatarHtml = UI.avatarEl(post.author, 'sm');

      return `
        <div class="bookmark-card">
          <div class="bookmark-body" data-slug="${post.slug}">
            <div class="bookmark-meta">
              <div class="bookmark-author">
                ${avatarHtml}
                <span>${UI.esc(post.author?.username || '')}</span>
              </div>
              <span class="bookmark-date">${UI.formatDate(date)}</span>
              ${post.category ? `<span class="bookmark-category">${UI.esc(post.category.name)}</span>` : ''}
            </div>
            <h2 class="bookmark-title">${UI.esc(post.title)}</h2>
            ${post.content ? `<p class="bookmark-excerpt">${UI.esc(UI.truncate(post.content, 140))}</p>` : ''}
            <div class="bookmark-footer">
              <span class="bookmark-stat">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M3 10a7 7 0 1014 0 7 7 0 00-14 0z"/>
                  <path d="M10 7v6M7 10h6"/>
                </svg>
                ${post.like_count ?? 0}
              </span>
              <span class="bookmark-stat">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M17 9A7 7 0 003 9c0 3 1.5 5.5 4 7l3 1 3-1c2.5-1.5 4-4 4-7z"/>
                </svg>
                ${post.comment_count ?? 0}
              </span>
            </div>
          </div>

          <!-- Unbookmark button -->
          <button class="btn-unbookmark" data-slug="${post.slug}" data-idx="${idx}" title="Remove bookmark">
            <svg viewBox="0 0 20 20" fill="currentColor" stroke="currentColor" stroke-width="1.4">
              <path d="M5 3a2 2 0 00-2 2v12l7-3 7 3V5a2 2 0 00-2-2H5z"/>
            </svg>
          </button>
        </div>
      `;
    }

    async function toggleBookmark(slug, idx) {
      try {
        await API.Interactions.bookmark(slug);
        bookmarks.splice(Number(idx), 1);
        renderBookmarks();
        UI.toast('Bookmark removed', 'info');
      } catch {
        UI.toast('Could not remove bookmark', 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
