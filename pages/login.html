<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Inkwell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="../index.html" class="auth-logo">Inkwell</a>

      <h1 class="form-title">Welcome back</h1>
      <p class="form-subtitle">Sign in to read, write, and connect.</p>

      <form id="login-form" novalidate>
        <div class="form-group" style="margin-bottom: 16px;">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" />
          <span class="form-error" id="email-err"></span>
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" />
          <span class="form-error" id="password-err"></span>
        </div>

        <div id="form-error" class="form-error" style="margin-bottom:12px;"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">
          Sign in
        </button>
      </form>

      <p style="text-align:center; margin-top: 20px; font-size: var(--text-sm); color: var(--ink-muted);">
        No account yet?
        <a href="register.html" style="color: var(--accent); font-weight:500;">Create one free</a>
      </p>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    // Redirect if already logged in
    if (API.Auth.isLoggedIn()) window.location.href = '../index.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submit-btn');
      const formErr = document.getElementById('form-error');

      // Clear errors
      formErr.textContent = '';
      document.getElementById('email-err').textContent = '';
      document.getElementById('password-err').textContent = '';

      if (!email) {
        document.getElementById('email').classList.add('error');
        document.getElementById('email-err').textContent = 'Email is required.';
        return;
      }
      if (!password) {
        document.getElementById('password').classList.add('error');
        document.getElementById('password-err').textContent = 'Password is required.';
        return;
      }

      UI.setLoading(btn, true);
      try {
        const res = await API.Auth.login({ email, password });
        // Fetch user profile
        const user = await API.Auth.getMe();
        AuthState.save(user);
        UI.toast('Welcome back, ' + user.username + '!', 'success');
        setTimeout(() => window.location.href = '../index.html', 600);
      } catch (err) {
        formErr.textContent = err.message || 'Login failed. Check your credentials.';
        UI.setLoading(btn, false, 'Sign in');
      }
    });
  </script>
</body>
</html>
