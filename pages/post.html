<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: https://fonts.googleapis.com https://fonts.gstatic.com http://127.0.0.1:* http://localhost:* ws://127.0.0.1:* ws://localhost:*; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com;"> -->
  <title>Post — Inkwell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <style>
    .post-detail-page {
      max-width: 720px;
      margin: 0 auto;
      padding: var(--space-10) var(--space-6) var(--space-20);
    }

    .post-back {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--ink-muted);
      margin-bottom: var(--space-8);
      transition: color var(--dur-fast);
    }
    .post-back:hover { color: var(--accent); }

    .post-header { margin-bottom: var(--space-8); }

    .post-category-label {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-4);
    }

    .post-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1.12;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: var(--space-5);
    }

    .post-byline {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .post-byline-author {
      font-weight: 600;
      font-size: var(--text-sm);
    }

    .post-byline-sep { color: var(--paper-3); }

    .post-byline-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--text-xs);
      color: var(--ink-faint);
    }

    .post-divider {
      border: none;
      border-top: 1px solid var(--paper-3);
      margin: var(--space-8) 0;
    }

    .post-body {
      font-size: var(--text-lg);
      line-height: 1.8;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .post-tags { display: flex; flex-wrap: wrap; gap: var(--space-2); margin-top: var(--space-8); }

    .post-actions {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-top: var(--space-8);
      padding: var(--space-5) 0;
      border-top: 1px solid var(--paper-3);
      border-bottom: 1px solid var(--paper-3);
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      border: 1.5px solid var(--paper-3);
      font-size: var(--text-sm);
      color: var(--ink-muted);
      background: var(--white);
      cursor: pointer;
      transition: all var(--dur-fast);
      font-family: inherit;
    }
    .action-btn:hover { border-color: var(--ink-faint); color: var(--ink); }
    .action-btn.liked { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .action-btn.bookmarked { border-color: #2d6a4f; color: #2d6a4f; background: #d8f3dc; }
    .action-btn svg { width: 16px; height: 16px; }

    .post-author-actions {
      display: flex;
      gap: var(--space-2);
      margin-left: auto;
    }

    /* Comments */
    .comments-section { margin-top: var(--space-12); }

    .comments-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: var(--text-2xl);
      margin-bottom: var(--space-6);
    }

    .comment-form { margin-bottom: var(--space-8); }

    .comment-form-inner {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .comment-list { display: flex; flex-direction: column; gap: var(--space-5); }

    .comment-item {
      padding: var(--space-4);
      background: var(--white);
      border: 1px solid var(--paper-3);
      border-radius: var(--radius-lg);
    }

    .comment-meta {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
    }

    .comment-author { font-weight: 600; font-size: var(--text-sm); }

    .comment-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--text-xs);
      color: var(--ink-faint);
      margin-left: auto;
    }

    .comment-body {
      font-size: var(--text-sm);
      line-height: 1.65;
      color: var(--ink);
      white-space: pre-wrap;
    }

    .comment-actions {
      display: flex;
      gap: var(--space-3);
      margin-top: var(--space-3);
    }

    .comment-action-btn {
      font-size: var(--text-xs);
      color: var(--ink-faint);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 2px 0;
      transition: color var(--dur-fast);
    }
    .comment-action-btn:hover { color: var(--accent); }

    .replies {
      margin-top: var(--space-4);
      padding-left: var(--space-8);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      border-left: 2px solid var(--paper-3);
    }

    .reply-item {
      padding: var(--space-3) var(--space-4);
      background: var(--paper);
      border-radius: var(--radius-md);
    }

    .reply-form {
      margin-top: var(--space-3);
      padding-left: var(--space-8);
      display: none;
    }
    .reply-form.open { display: block; }
    .reply-form-inner {
      display: flex;
      gap: var(--space-2);
      align-items: flex-end;
    }
    .reply-form-inner textarea {
      flex: 1;
      min-height: 60px;
      resize: none;
    }

    .login-prompt {
      background: var(--paper-2);
      border: 1px solid var(--paper-3);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      text-align: center;
      font-size: var(--text-sm);
      color: var(--ink-muted);
    }
    .login-prompt a { color: var(--accent); font-weight: 500; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="../index.html" class="nav-brand">Inkwell</a>
    <div class="nav-links">
      <a href="../index.html" class="nav-link">Feed</a>
      <a href="write.html" class="nav-link" id="nav-write">Write</a>
      <a href="bookmarks.html" class="nav-link" id="nav-bookmarks">Bookmarks</a>
    </div>
    <div class="nav-auth" id="nav-auth">
      <a href="login.html" class="btn btn-ghost">Sign in</a>
      <a href="register.html" class="btn btn-primary">Join</a>
    </div>
    <div class="nav-user hidden" id="nav-user">
      <div class="avatar-wrap" id="nav-avatar-wrap">
        <div class="dropdown" id="nav-dropdown">
          <a href="profile.html" class="dropdown-item">My Profile</a>
          <a href="write.html" class="dropdown-item">New Post</a>
          <hr class="dropdown-divider"/>
          <button class="dropdown-item danger" id="btn-logout">Sign out</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="post-detail-page" id="post-container">
    <div class="empty-state"><span class="spinner"></span></div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    const slug = new URLSearchParams(location.search).get('slug');
    if (!slug) window.location.href = '../index.html';

    let post = null;
    let liked = false;
    let bookmarked = false;

    async function init() {
      await AuthState.init();
      if (!slug) return;
      try {
        post = await API.Posts.get(slug);
        document.title = `${post.title} — Inkwell`;
        renderPost();
        await loadComments();
      } catch (err) {
        document.getElementById('post-container').innerHTML =
          UI.emptyState('📄', 'Post not found', 'This post may have been removed.',
            `<a href="../index.html" class="btn btn-ghost">Back to feed</a>`);
      }
    }

    function renderPost() {
      const isOwner = AuthState.user && post.author?.username === AuthState.user.username;

      document.getElementById('post-container').innerHTML = `
        <a href="../index.html" class="post-back">← Back to feed</a>

        <article class="post-header">
          ${post.category ? `<span class="post-category-label">${UI.esc(post.category.name)}</span>` : ''}
          <h1 class="post-title">${UI.esc(post.title)}</h1>
          <div class="post-byline">
            ${UI.avatarEl(post.author, 'sm')}
            <span class="post-byline-author">${UI.esc(post.author?.username || '')}</span>
            <span class="post-byline-sep">·</span>
            <span class="post-byline-date">${UI.formatDate(post.published_at || post.created_at)}</span>
            ${post.status === 'draft' ? '<span class="draft-badge">Draft</span>' : ''}
          </div>
        </article>

        <hr class="post-divider" />

        <div class="post-body">${UI.esc(post.content)}</div>

        ${post.tags?.length ? `
          <div class="post-tags">
            ${post.tags.map(t => `<span class="tag-chip">#${UI.esc(t.name)}</span>`).join('')}
          </div>` : ''}

        <div class="post-actions">
          <button class="action-btn" id="like-btn" onclick="toggleLike()">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"/>
            </svg>
            <span id="like-count">${post.like_count ?? 0}</span>
          </button>

          <button class="action-btn" id="bookmark-btn" onclick="toggleBookmark()">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-3-5 3V4z"/>
            </svg>
            Save
          </button>

        ${isOwner ? `
            <div class="post-author-actions">
                <!-- Fixed parameter from ?edit= to ?slug= -->
                <a href="write.html?slug=${post.slug}" class="btn btn-ghost btn-sm">Edit</a>
                <button class="btn btn-sm" style="color:var(--accent);border:1.5px solid var(--accent-dim);" onclick="deletePost()">Delete</button>
            </div>
        ` : ''}
        </div>

        <section class="comments-section">
          <h2 class="comments-title">Discussion <span style="font-size:var(--text-lg);color:var(--ink-faint);" id="comment-count-label">(${post.comment_count ?? 0})</span></h2>

          <div id="comment-form-area">
            ${AuthState.isLoggedIn() ? `
              <div class="comment-form">
                <div class="comment-form-inner">
                  <textarea class="form-input form-textarea" id="new-comment" placeholder="Share your thoughts…" rows="3"></textarea>
                  <button class="btn btn-primary" id="comment-submit-btn" onclick="submitComment()">Post comment</button>
                </div>
              </div>
            ` : `
              <div class="login-prompt">
                <a href="login.html">Sign in</a> or <a href="register.html">create an account</a> to join the discussion.
              </div>
            `}
          </div>

          <div class="comment-list" id="comment-list"></div>
        </section>
      `;
    }

    async function loadComments() {
      const list = document.getElementById('comment-list');
      if (!list) return;

      try {
        const comments = await API.Comments.list(slug);
        if (!comments.count) {
          list.innerHTML = `<p style="color:var(--ink-faint);font-size:var(--text-sm);text-align:center;padding:var(--space-8);">No comments yet. Start the conversation.</p>`;
          return;
        }
        commentsArray = Object.values(comments.results);
        list.innerHTML = commentsArray.map(c => renderComment(c)).join('');
        bindCommentActions();
      } catch { /* silent */ }
    }

    function renderComment(c) {
      const isOwner = AuthState.user && c.author?.username === AuthState.user.username;
      return `
        <div class="comment-item" data-id="${c.id}">
          <div class="comment-meta">
            ${UI.avatarEl(c.author, 'sm')}
            <span class="comment-author">${UI.esc(c.author?.username || '')}</span>
            <span class="comment-date">${UI.formatRelative(c.created_at)}</span>
          </div>
          <p class="comment-body">${UI.esc(c.body)}</p>
          <div class="comment-actions">
            ${AuthState.isLoggedIn() ? `<button class="comment-action-btn reply-btn" data-id="${c.id}">↩ Reply</button>` : ''}
            ${isOwner ? `<button class="comment-action-btn delete-comment-btn" data-id="${c.id}" style="margin-left:auto;">Delete</button>` : ''}
          </div>
          <div class="reply-form" id="reply-form-${c.id}">
            <div class="reply-form-inner">
              <textarea class="form-input form-textarea" id="reply-text-${c.id}" placeholder="Write a reply…" rows="2"></textarea>
              <button class="btn btn-primary btn-sm" onclick="submitReply('${c.id}')">Reply</button>
            </div>
          </div>
          ${c.replies?.length ? `
            <div class="replies">
              ${c.replies.map(r => `
                <div class="reply-item">
                  <div class="comment-meta">
                    ${UI.avatarEl(r.author, 'sm')}
                    <span class="comment-author">${UI.esc(r.author?.username || '')}</span>
                    <span class="comment-date">${UI.formatRelative(r.created_at)}</span>
                    ${AuthState.user && r.author?.username === AuthState.user.username
                      ? `<button class="comment-action-btn delete-comment-btn" data-id="${r.id}" style="margin-left:auto;">Delete</button>`
                      : ''}
                  </div>
                  <p class="comment-body">${UI.esc(r.body)}</p>
                </div>
              `).join('')}
            </div>
          ` : ''}
        </div>`;
    }

    function bindCommentActions() {
      // Reply toggle
      document.querySelectorAll('.reply-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const form = document.getElementById('reply-form-' + btn.dataset.id);
          if (form) form.classList.toggle('open');
        });
      });

      // Delete comment
      document.querySelectorAll('.delete-comment-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete this comment?')) return;
          try {
            await API.Comments.delete(slug, btn.dataset.id);
            UI.toast('Comment deleted', 'success');
            await loadComments();
          } catch (err) { UI.toast(err.message, 'error'); }
        });
      });
    }

    async function submitComment() {
      if (!AuthState.isLoggedIn()) { window.location.href = 'login.html'; return; }
      const ta = document.getElementById('new-comment');
      const body = ta?.value.trim();
      if (!body) { UI.toast('Comment cannot be empty.', 'error'); return; }

      const btn = document.getElementById('comment-submit-btn');
      UI.setLoading(btn, true);
      try {
        await API.Comments.create(slug, body);
        ta.value = '';
        UI.toast('Comment posted!', 'success');
        await loadComments();
      } catch (err) { UI.toast(err.message, 'error'); }
      UI.setLoading(btn, false, 'Post comment');
    }

    async function submitReply(parentId) {
      const ta = document.getElementById('reply-text-' + parentId);
      const body = ta?.value.trim();
      if (!body) return;
      try {
        await API.Comments.create(slug, body, parentId);
        ta.value = '';
        document.getElementById('reply-form-' + parentId)?.classList.remove('open');
        UI.toast('Reply posted!', 'success');
        await loadComments();
      } catch (err) { UI.toast(err.message, 'error'); }
    }

    async function toggleLike() {
      if (!AuthState.isLoggedIn()) { window.location.href = 'login.html'; return; }
      try {
        const res = await API.Interactions.like(slug);
        liked = res.liked;
        const btn = document.getElementById('like-btn');
        const count = document.getElementById('like-count');
        if (btn) btn.classList.toggle('liked', liked);
        if (count) count.textContent = res.like_count;
      } catch (err) { UI.toast(err.message, 'error'); }
    }

    async function toggleBookmark() {
      if (!AuthState.isLoggedIn()) { window.location.href = 'login.html'; return; }
      try {
        const res = await API.Interactions.bookmark(slug);
        bookmarked = res.bookmarked;
        const btn = document.getElementById('bookmark-btn');
        if (btn) btn.classList.toggle('bookmarked', bookmarked);
        UI.toast(bookmarked ? 'Saved to bookmarks' : 'Removed from bookmarks', 'success');
      } catch (err) { UI.toast(err.message, 'error'); }
    }

    async function deletePost() {
      if (!confirm('Delete this post? This cannot be undone.')) return;
      try {
        await API.Posts.delete(slug);
        UI.toast('Post deleted', 'success');
        setTimeout(() => window.location.href = '../index.html', 700);
      } catch (err) { UI.toast(err.message, 'error'); }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
