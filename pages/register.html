<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Inkwell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="../index.html" class="auth-logo">Inkwell</a>

      <h1 class="form-title">Start writing</h1>
      <p class="form-subtitle">Create your free account in seconds.</p>

      <form id="register-form" novalidate>
        <div class="form-group" style="margin-bottom:14px;">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" />
          <span class="form-error" id="email-err"></span>
        </div>

        <div class="form-group" style="margin-bottom:14px;">
          <label class="form-label" for="username">Username</label>
          <input type="text" id="username" class="form-input" placeholder="yourhandle" autocomplete="username" />
          <span class="form-error" id="username-err"></span>
        </div>

        <div class="form-group" style="margin-bottom:14px;">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="At least 8 characters" autocomplete="new-password" />
          <span class="form-error" id="password-err"></span>
        </div>

        <div class="form-group" style="margin-bottom:24px;">
          <label class="form-label" for="password2">Confirm password</label>
          <input type="password" id="password2" class="form-input" placeholder="••••••••" autocomplete="new-password" />
          <span class="form-error" id="password2-err"></span>
        </div>

        <div id="form-error" class="form-error" style="margin-bottom:12px;"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">
          Create account
        </button>
      </form>

      <p style="text-align:center; margin-top: 20px; font-size: var(--text-sm); color: var(--ink-muted);">
        Already have an account?
        <a href="login.html" style="color: var(--accent); font-weight:500;">Sign in</a>
      </p>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    if (API.Auth.isLoggedIn()) window.location.href = '../index.html';

    const fields = ['email','username','password','password2'];

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const vals = {};
      let valid = true;
      fields.forEach(f => {
        vals[f] = document.getElementById(f).value.trim();
        document.getElementById(f).classList.remove('error');
        document.getElementById(f + '-err').textContent = '';
      });
      document.getElementById('form-error').textContent = '';

      if (!vals.email) { showErr('email', 'Email is required.'); valid = false; }
      if (!vals.username) { showErr('username', 'Username is required.'); valid = false; }
      if (vals.password.length < 8) { showErr('password', 'Minimum 8 characters.'); valid = false; }
      if (vals.password !== vals.password2) { showErr('password2', 'Passwords do not match.'); valid = false; }
      if (!valid) return;

      const btn = document.getElementById('submit-btn');
      UI.setLoading(btn, true);

      try {
        const res = await API.Auth.register(vals);
        // Register returns tokens + user
        if (res.tokens) {
          API_TOKENS_SAVE(res.tokens.access, res.tokens.refresh);
          AuthState.save(res.user);
        }
        UI.toast('Account created! Welcome, ' + res.user.username + ' 🎉', 'success');
        setTimeout(() => window.location.href = '../index.html', 700);
      } catch (err) {
        if (err.data) {
          fields.forEach(f => {
            const msg = UI.getFieldError(err.data, f);
            if (msg) showErr(f, msg);
          });
          if (!Object.keys(err.data).some(k => fields.includes(k))) {
            document.getElementById('form-error').textContent = err.message;
          }
        } else {
          document.getElementById('form-error').textContent = err.message;
        }
        UI.setLoading(btn, false, 'Create account');
      }
    });

    function showErr(field, msg) {
      document.getElementById(field).classList.add('error');
      document.getElementById(field + '-err').textContent = msg;
    }

    function API_TOKENS_SAVE(access, refresh) {
      localStorage.setItem('inkwell_access', access);
      localStorage.setItem('inkwell_refresh', refresh);
    }
  </script>
</body>
</html>
